openapi: "3.0.3"
info:
  title: creekd Admin API
  version: 0.1.0
  description: |
    Process supervisor admin API for creekd.
    All endpoints require Bearer token authentication when CREEKD_ADMIN_TOKEN is set.

servers:
  - url: http://localhost:9080
    description: Default local admin address

security:
  - bearerAuth: []

tags:
  - name: apps
    description: Application lifecycle management
  - name: volumes
    description: Persistent volume management

paths:
  /v1/apps:
    post:
      operationId: spawnApp
      summary: Spawn a new supervised app
      tags: [apps]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpawnRequest"
      responses:
        "201":
          description: App spawned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppView"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: App already running or port conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      operationId: listApps
      summary: List all supervised apps
      tags: [apps]
      responses:
        "200":
          description: List of apps
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAppsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/apps/{id}:
    parameters:
      - $ref: "#/components/parameters/AppID"

    get:
      operationId: getApp
      summary: Get app details (k8s-style envelope)
      description: |
        Returns the App resource in the k8s wire-format envelope
        `{apiVersion, kind, metadata, spec, status}`. This is the
        first endpoint to use the envelope shape; SpawnApp + ListApps
        still return the legacy AppView shape during the envelope
        refactor (will land per-handler over subsequent PRs).
        See DESIGN-self-host-state.md §"The interop-bearing subset".
      tags: [apps]
      responses:
        "200":
          description: App envelope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/App"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: stopApp
      summary: Stop and remove an app
      description: |
        Accepts optional `If-Match: <resourceVersion>` header.
        Mismatch → 412 Precondition Failed with current rv in
        response body. Missing header → unconditional delete, with
        `Warning: 299 - "unconditional-write"` response header.
      tags: [apps]
      parameters:
        - in: header
          name: If-Match
          schema:
            type: string
          description: Current resourceVersion (opaque). Mismatch yields 412.
      responses:
        "204":
          description: App stopped
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "412":
          $ref: "#/components/responses/PreconditionFailed"

  /v1/apps/{id}/deploy:
    parameters:
      - $ref: "#/components/parameters/AppID"

    post:
      operationId: deployApp
      summary: Blue-green deploy a new version
      description: |
        Accepts optional `If-Match: <resourceVersion>` header.
        Mismatch → 412 Precondition Failed with current rv in
        response body. Missing header → unconditional deploy, with
        `Warning: 299 - "unconditional-write"` response header.
      tags: [apps]
      parameters:
        - in: header
          name: If-Match
          schema:
            type: string
          description: Current resourceVersion (opaque). Mismatch yields 412.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeployRequest"
      responses:
        "200":
          description: Deploy complete, new version live
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppView"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Port conflict or deploy already in progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "412":
          $ref: "#/components/responses/PreconditionFailed"
        "502":
          description: New version failed health check
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/apps/{id}/restart:
    parameters:
      - $ref: "#/components/parameters/AppID"

    post:
      operationId: restartApp
      summary: Restart an app
      tags: [apps]
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RestartRequest"
      responses:
        "200":
          description: App restarted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppView"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/apps/{id}/rollback:
    parameters:
      - $ref: "#/components/parameters/AppID"

    post:
      operationId: rollbackApp
      summary: Roll back to a prior release
      description: |
        Re-runs the supervisor with the ConfigSnapshot persisted in
        the target Release. Creates a new Release record (with a
        fresh, monotonic ReleaseSeq) pointing at the target's
        artifact via `rolledBackFrom` and `originalArtifactRelease`.
        The prior Active release flips to phase=RolledBack (not
        Superseded, distinguishing rollback from forward deploy).

        `to` is the target Release's ReleaseSeq. The target must
        carry a `configSnapshot` — Releases created before #8c
        (or rollback into a release with stripped snapshot) return
        412 `release_artifact_pruned`.

        Accepts optional `If-Match: <resourceVersion>`. Mismatch
        → 412.
      tags: [apps]
      parameters:
        - name: to
          in: query
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
          description: Target ReleaseSeq to roll back to.
        - in: header
          name: If-Match
          schema:
            type: string
          description: Current resourceVersion (opaque). Mismatch yields 412.
      responses:
        "200":
          description: Rollback complete, new Release active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Release"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: |
            App or target release not found. When the release is
            absent OR has no usable ConfigSnapshot, ErrorResponse.code
            is `release_artifact_pruned`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "412":
          $ref: "#/components/responses/PreconditionFailed"

  /v1/apps/{id}/reset:
    parameters:
      - $ref: "#/components/parameters/AppID"

    post:
      operationId: resetApp
      summary: Reset a crash-looping app
      tags: [apps]
      responses:
        "200":
          description: App reset and restarted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppView"
        "204":
          description: Reset succeeded but app is no longer present
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: App is not crash-looping
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/apps/{id}/logs:
    parameters:
      - $ref: "#/components/parameters/AppID"

    get:
      operationId: getAppLogs
      summary: Read app log output
      tags: [apps]
      parameters:
        - name: tail
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 10000
            default: 100
          description: Number of lines from the end
        - name: follow
          in: query
          schema:
            type: string
            enum: ["true"]
          description: Stream new lines as SSE events
      responses:
        "200":
          description: |
            Without follow: text/plain with the last N lines.
            With follow=true: text/event-stream with initial tail then live updates.
          content:
            text/plain:
              schema:
                type: string
            text/event-stream:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/apps/{id}/events:
    parameters:
      - $ref: "#/components/parameters/AppID"

    get:
      operationId: getAppEvents
      summary: SSE stream of app state transitions
      tags: [apps]
      responses:
        "200":
          description: Server-Sent Events stream
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/AppEvent"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/apps/{id}/stats:
    parameters:
      - $ref: "#/components/parameters/AppID"

    get:
      operationId: getAppStats
      summary: Get cgroup resource stats
      tags: [apps]
      responses:
        "200":
          description: Resource stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsView"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/volumes:
    post:
      operationId: registerVolume
      summary: Register a persistent volume
      tags: [volumes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VolumeRequest"
      responses:
        "201":
          description: Volume registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolumeView"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Volume already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      operationId: listVolumes
      summary: List all registered volumes
      tags: [volumes]
      responses:
        "200":
          description: List of volumes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListVolumesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/volumes/{id}:
    parameters:
      - $ref: "#/components/parameters/VolumeID"

    get:
      operationId: getVolume
      summary: Get volume details
      tags: [volumes]
      responses:
        "200":
          description: Volume details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolumeView"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deleteVolume
      summary: Delete a volume
      tags: [volumes]
      parameters:
        - name: force
          in: query
          schema:
            type: boolean
          description: Force delete even if apps reference this volume
      responses:
        "204":
          description: Volume deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Volume in use by running apps
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: CREEKD_ADMIN_TOKEN

  parameters:
    AppID:
      name: id
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-z0-9][a-z0-9-]*[a-z0-9]$"
        minLength: 2
        maxLength: 63
      description: App identifier (DNS-label format)

    VolumeID:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Volume identifier

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    PreconditionFailed:
      description: |
        If-Match header did not match the current resourceVersion.
        Response body includes the current resourceVersion so clients
        can retry. First-party clients SHOULD send If-Match on
        spec-mutating calls; missing header is allowed but emits a
        `Warning: 299 - "unconditional-write"` response header.
      headers:
        ETag:
          description: Current resourceVersion (opaque string) of the resource.
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    Runtime:
      type: string
      enum: [bun, node, deno]

    ErrorCode:
      type: string
      enum:
        - bad_request
        - unauthorized
        - not_found
        - conflict
        - already_running
        - port_conflict
        - invalid_id
        - invalid_runtime
        - deploy_unhealthy
        - resource_version_mismatch
        - unsupported_filesystem
        - storage_corrupted
        - release_artifact_pruned
        - internal

    ErrorResponse:
      type: object
      required: [code, error]
      properties:
        code:
          $ref: "#/components/schemas/ErrorCode"
        error:
          type: string

    Limits:
      type: object
      properties:
        memory_high_bytes:
          type: integer
          format: int64
        memory_max_bytes:
          type: integer
          format: int64
        pids_max:
          type: integer
          format: int64
        cpu_quota_us:
          type: integer
          format: int64
        cpu_period_us:
          type: integer
          format: int64

    Sandbox:
      type: object
      properties:
        pid_namespace:
          type: boolean
        uts_namespace:
          type: boolean
        ipc_namespace:
          type: boolean
        mount_namespace:
          type: boolean
        user_namespace:
          type: boolean
        no_new_privs:
          type: boolean
        chroot:
          type: string

    VolumeMount:
      type: object
      required: [volume_id, target]
      properties:
        volume_id:
          type: string
        sub_path:
          type: string
        target:
          type: string
        read_only:
          type: boolean

    SpawnRequest:
      type: object
      required: [id, port]
      properties:
        id:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]*[a-z0-9]$"
          minLength: 2
          maxLength: 63
        runtime:
          $ref: "#/components/schemas/Runtime"
        entry:
          type: string
        command:
          type: string
        args:
          type: array
          items:
            type: string
        port:
          type: integer
          minimum: 1
          maximum: 65535
        env:
          type: array
          items:
            type: string
          description: "KEY=VALUE pairs"
        limits:
          $ref: "#/components/schemas/Limits"
        net_isolation:
          type: boolean
        sandbox:
          $ref: "#/components/schemas/Sandbox"
        health_check_path:
          type: string
        volume_mounts:
          type: array
          items:
            $ref: "#/components/schemas/VolumeMount"

    DeployRequest:
      type: object
      required: [port]
      properties:
        runtime:
          $ref: "#/components/schemas/Runtime"
        entry:
          type: string
        command:
          type: string
        args:
          type: array
          items:
            type: string
        port:
          type: integer
          minimum: 1
          maximum: 65535
        env:
          type: array
          items:
            type: string
        limits:
          $ref: "#/components/schemas/Limits"
        net_isolation:
          type: boolean
        sandbox:
          $ref: "#/components/schemas/Sandbox"
        health_check_path:
          type: string
        volume_mounts:
          type: array
          items:
            $ref: "#/components/schemas/VolumeMount"
        ready_timeout_ms:
          type: integer
          format: int64
        poll_interval_ms:
          type: integer
          format: int64
        graceful_v1_ms:
          type: integer
          format: int64

    RestartRequest:
      type: object
      properties:
        timeout_ms:
          type: integer
          format: int64

    App:
      type: object
      description: |
        K8s-style resource envelope. See DESIGN-self-host-state.md
        "The interop-bearing subset" for the field semantics.
      required: [apiVersion, kind, metadata, spec, status]
      properties:
        apiVersion:
          type: string
          enum: ["creek.dev/v1alpha1"]
        kind:
          type: string
          enum: ["App"]
        metadata:
          $ref: "#/components/schemas/AppMetadata"
        spec:
          $ref: "#/components/schemas/AppSpec"
        status:
          $ref: "#/components/schemas/AppStatus"

    AppMetadata:
      type: object
      required: [name, uid, generation, resourceVersion, creationTimestamp]
      properties:
        name:
          type: string
          description: Human-readable ID, [a-z0-9-] 1-63 chars.
        uid:
          type: string
          format: uuid
          description: UUIDv7. Stable across rename; never reused.
        generation:
          type: integer
          format: int64
          minimum: 0
          description: Bumps on every successful spec write. NOT bumped on status, annotations, or labels.
        resourceVersion:
          type: string
          description: Opaque CAS token. Clients MUST NOT do arithmetic on it.
        creationTimestamp:
          type: string
          format: date-time
          description: RFC3339. Immutable; preserved across restore.

    AppSpec:
      type: object
      description: Desired state. Settable by clients.
      properties:
        runtime:
          type: string
        command:
          type: string
        args:
          type: array
          items:
            type: string
        env:
          type: array
          items:
            type: string
        port:
          type: integer

    Condition:
      type: object
      description: |
        Status of one named runtime condition. Mirrors the K8s
        condition tuple: a closed type vocabulary, tri-state status
        (True / False / Unknown), and the timestamp of the last
        observed transition. `reason` is a CamelCase token for
        machine consumption; `message` is human-readable.
      required: [type, status, lastTransitionTime, reason]
      properties:
        type:
          type: string
          enum: [Ready, Progressing, Degraded, BackupReady]
        status:
          type: string
          enum: ["True", "False", "Unknown"]
        lastTransitionTime:
          type: string
          format: date-time
        reason:
          type: string
        message:
          type: string

    AppStatus:
      type: object
      description: Observed state. Server-written; clients receive 405 on writes.
      required: [observedGeneration, conditions, currentPid, currentPort, restartCount, healthFailures, uptimeMs]
      properties:
        observedGeneration:
          type: integer
          format: int64
          description: Last spec generation the deploy flow has converged to a healthy state on.
        conditions:
          type: array
          description: |
            Closed set of observed condition types: Ready, Progressing,
            Degraded, BackupReady. Recomputed at GET time from supervisor
            runtime state. The set is fixed in v1alpha1 — adding a new
            condition type requires an ADR.
          items:
            $ref: "#/components/schemas/Condition"
        currentPid:
          type: integer
        currentPort:
          type: integer
        restartCount:
          type: integer
        healthFailures:
          type: integer
          format: int64
        uptimeMs:
          type: integer
          format: int64
        netIp:
          type: string

    Release:
      type: object
      description: |
        One entry in an app's release ledger. Created on every
        successful deploy + rollback. Immutable except for `phase`,
        which transitions Active → Superseded | RolledBack as newer
        releases land. Records are kept indefinitely; only the
        underlying artifact images are GC'd (Phase 1.5).
      required: [uid, phase, creationTimestamp, spec]
      properties:
        uid:
          type: string
          format: uuid
          description: UUIDv7 stable identity.
        phase:
          type: string
          enum: [Active, Superseded, RolledBack]
        creationTimestamp:
          type: string
          format: date-time
        spec:
          $ref: "#/components/schemas/ReleaseSpec"

    ReleaseSpec:
      type: object
      description: |
        Immutable payload of one Release. `rolledBackFrom` +
        `originalArtifactRelease` reference the source release by
        ReleaseSeq within the same app; zero / unset means "fresh
        deploy, not a rollback".
      required: [appUid, releaseSeq]
      properties:
        appUid:
          type: string
          format: uuid
        releaseSeq:
          type: integer
          format: int64
          description: Per-app monotonic counter; never reused.
        gitSha:
          type: string
        image:
          type: string
        envHash:
          type: string
          description: sha256:<hex> over sorted KEY=value env pairs.
        createdBy:
          type: string
          description: Identity of the caller that created this release.
        rolledBackFrom:
          type: integer
          format: int64
          description: Immediate source ReleaseSeq if this release was created by a rollback.
        originalArtifactRelease:
          type: integer
          format: int64
          description: First-appearance ReleaseSeq of the underlying artifact. Resolves rollback-chain ambiguity.

    AppView:
      type: object
      required: [id, command, port, status, pid, uptime_ms, restart_count, health_failures]
      properties:
        id:
          type: string
        runtime:
          $ref: "#/components/schemas/Runtime"
        command:
          type: string
        args:
          type: array
          items:
            type: string
        env:
          type: array
          items:
            type: string
        port:
          type: integer
        status:
          type: string
          # Values mirror supervisor.Status.String() output. The
          # crash-looping spelling (hyphen) is the wire format already
          # used by Prometheus metrics and the audit log; the spec
          # follows the code rather than the other way around.
          enum: [unknown, starting, running, crashed, crash-looping, stopped, unhealthy]
        pid:
          type: integer
        uptime_ms:
          type: integer
          format: int64
        restart_count:
          type: integer
        health_failures:
          type: integer
          format: int64
        net_ip:
          type: string

    ListAppsResponse:
      type: object
      required: [apps]
      properties:
        apps:
          type: array
          items:
            $ref: "#/components/schemas/AppView"

    StatsView:
      type: object
      required: [id, cgroup_enabled]
      properties:
        id:
          type: string
        cgroup_enabled:
          type: boolean
        memory_current_bytes:
          type: integer
          format: int64
        memory_max_bytes:
          type: integer
          format: int64
        pids_current:
          type: integer
          format: int64
        cpu_usage_usec:
          type: integer
          format: int64
        oom_kills:
          type: integer
          format: int64
        read_err:
          type: string

    EventType:
      type: string
      enum: [status_changed, ready, health_failure, restart, oom_kill]

    AppEvent:
      type: object
      required: [type, app_id, ts]
      properties:
        type:
          $ref: "#/components/schemas/EventType"
        app_id:
          type: string
        status:
          type: string
        pid:
          type: integer
        port:
          type: integer
        url:
          type: string
        restart_count:
          type: integer
        health_failures:
          type: integer
          format: int64
        ts:
          type: string
          format: date-time

    VolumeRequest:
      type: object
      required: [id, backing_path]
      properties:
        id:
          type: string
        backing_path:
          type: string
        read_only:
          type: boolean

    VolumeView:
      type: object
      required: [id, backing_path]
      properties:
        id:
          type: string
        backing_path:
          type: string
        read_only:
          type: boolean
        fs_type:
          type: string

    ListVolumesResponse:
      type: object
      required: [volumes]
      properties:
        volumes:
          type: array
          items:
            $ref: "#/components/schemas/VolumeView"
