name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (race)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test -race
        # Linux-only tests that need CAP_SYS_ADMIN (cgroup v2, netns,
        # PID namespace, chroot) self-skip via requirePrivilegedCgroupSup
        # when the runner doesn't have the caps. The privileged job
        # below picks them up.
        run: go test -race -count=1 -timeout 180s ./...

  test-linux-privileged:
    name: test-linux (privileged docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: make test-linux
        # Builds Dockerfile.test (busybox-static, iproute2, iptables,
        # util-linux's setpriv) and runs the full suite inside a
        # --privileged container with cgroupfs rw — the only way the
        # M5.5 cgroup / netns / sandbox integration tests actually run.
        run: make test-linux

  bench:
    name: bench (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: make bench-smoke
        # Smoke-only: ensures every Benchmark* still compiles and
        # produces output. -benchtime=1x runs each Benchmark exactly
        # once so the runner doesn't OOM holding 3s worth of spawned
        # child processes per bench.
        run: make bench-smoke

  vuln:
    name: vuln (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      # govulncheck uses call-graph analysis so it only fails on CVEs
      # in code paths we actually reach — not just "any version of any
      # dep". Run the official tool directly rather than via a wrapper
      # action: keeps every step on the current Node runtime instead
      # of inheriting stale internal pins from a third-party wrapper.
      # Failures on PR/push catch newly-introduced vulnerable deps;
      # the weekly schedule in vuln-schedule.yml covers CVEs
      # disclosed against deps that are already in go.mod.
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck
        run: govulncheck ./...
