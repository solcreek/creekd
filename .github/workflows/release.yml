name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # goreleaser needs to create the release
  id-token: write   # OIDC for cosign keyless signing + SLSA generator

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    outputs:
      # Base64-encoded multi-line `sha256sum` payload (one
      # "<digest>  <filename>" per line), as required by
      # slsa-framework/slsa-github-generator's base64-subjects input.
      # The provenance job below attests exactly these bytes — no
      # rebuild, no chance of drift.
      hashes: ${{ steps.hashes.outputs.hashes }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # goreleaser needs full history for changelog

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: install cosign
        uses: sigstore/cosign-installer@v3
        with:
          # Pin sigstore/cosign to a known major. v2.x is the current
          # GA line; v2 includes the sign-blob keyless flow.
          cosign-release: "v2.4.1"

      - name: goreleaser
        # Pinned to @v6 — @v7 introduced a self-verify step that
        # downloads goreleaser binaries and checks their cosign
        # signature against an identity (`.../release.yml@refs/tags/v<X>`)
        # that drifts whenever goreleaser cuts a new release with a
        # different bundle format. The v0.1.2 tag push (2026-05-27)
        # broke on `bundle does not contain cert for verification`.
        # v6 has no self-verify and is the known-working line used
        # through v0.1.0 and v0.1.1.
        uses: goreleaser/goreleaser-action@v6
        with:
          # Pin the goreleaser binary too. `latest` floats and is
          # what surfaces upstream regressions inside CI; lock to
          # the v2 major.
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: compute artifact hashes for SLSA attestation
        id: hashes
        # SHA256 every release asset so the SLSA generator can attest
        # the exact bytes goreleaser produced — including the cosign
        # signature + Fulcio cert that install.sh consumes, so an
        # attacker cannot swap them post-build without violating
        # provenance. Encode the multi-line input as base64 per
        # slsa-framework convention to survive GitHub Actions'
        # env-var sanitisation.
        run: |
          set -euo pipefail
          cd dist
          hashes=$(sha256sum *.tar.gz checksums.txt checksums.txt.sig checksums.txt.pem | base64 -w0)
          echo "hashes=${hashes}" >> "$GITHUB_OUTPUT"

  # SLSA Level 3 build provenance for every artifact in the release.
  # Runs in a separate reusable workflow so the attestation chain
  # has its own audit trail and isn't co-mingled with the build job.
  #
  # Permission scoping: slsa-github-generator uses Sigstore/Rekor
  # (NOT GitHub's native attestations API), so this job needs
  # `id-token: write` for OIDC and `actions: read` to look up the
  # build environment, but explicitly does NOT need
  # `attestations: write`. The override here matches that — no
  # unused capability is granted.
  provenance:
    needs: [goreleaser]
    permissions:
      contents: write
      id-token: write
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: ${{ needs.goreleaser.outputs.hashes }}
      upload-assets: true
