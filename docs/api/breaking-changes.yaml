# API change ledger for creekd's admin API (api/openapi.yaml).
#
# The PR template's "API impact" section refers contributors here.
# Every PR that touches the wire format declares its impact by
# adding a row below (additive) or by linking an ADR that justifies
# a breaking row.
#
# Schema:
#   versions:
#     - version: vX.Y.Z              # the release the change shipped in
#       date: YYYY-MM-DD
#       changes:
#         - kind: additive | breaking
#           summary: one-line description of the change
#           ref:     PR or ADR number (e.g. "#42" or "ADR-0003")
#           migration: ""             # empty for additive
#                                     # required for breaking — say
#                                     # what callers must do
#
# Phase 1 status (0.0.x): the API is unstable; this file is the
# place to start tracking entries, but breaking changes are
# permitted without an ADR until 0.1.0 freezes the surface. The
# `kind: breaking` rows below 0.1.0 are advisory.
#
# Unreleased entries land under `version: unreleased`; the
# release engineer relocates them under the actual semver tag at
# tag time.

versions:
  - version: unreleased
    changes:
      - kind: additive
        summary: |
          New ErrorCode value `upgrade_signature_invalid` for the
          admin API's error response, returned when
          `creekctl self-upgrade` rejects an artifact via cosign
          signature mismatch or tarball SHA256 mismatch.
        ref: "#11"
        migration: ""
      - kind: additive
        summary: |
          AppMetadata.uid description now documents that the
          field is UUIDv7 from the persistence store OR UUIDv5
          synthesized from the app id when the daemon runs without
          a store (CREEKD_STATE_DIR unset). Wire shape unchanged
          (still `format: uuid`); only the description widens.
          The uniqueness-across-delete+recreate guarantee is
          scoped to the persisted-store path — no-store mode
          reuses the v5 uid when an app id is recreated.
        ref: "#16"
        migration: ""
      - kind: additive
        summary: |
          New ErrorCode value `request_too_large`, returned with
          HTTP 413 when the request body exceeds the
          MaxRequestBodyBytes limit. Previously these requests
          surfaced as 413-status / bad_request-body (status
          pre-written by http.MaxBytesReader, body produced by
          the 400 path) — inconsistent, and dependent on the
          ResponseWriter implementation.
        ref: "#16"
        migration: ""
